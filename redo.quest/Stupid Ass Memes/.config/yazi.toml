[opener]
# Video
video = [
    { run = 'mpv "$1"', desc = "mpv", for = "linux" },
]

# Images
image = [
    { run = 'sxiv "$1"', desc = "sxiv", for = "linux" },
]

# Text editing
editor = [
    { run = 'nvim "$1"', block = true, desc = "nvim", for = "unix" },
]

# Web browser
browser = [
    { run = 'zen-browser "$1"', desc = "Zen Browser", for = "linux" },
]

# PDFs - using Ocular
pdf = [
    { run = 'ocular "$1"', desc = "Ocular", for = "linux" },
]

# Office documents - LibreOffice
office = [
    { run = 'libreoffice "$1"', desc = "LibreOffice", for = "linux" },
]

# Archives
archive = [
    { run = 'atool -x "$1"', desc = "Extract here", for = "linux" },
]

# Audio
audio = [
    { run = 'mpv "$1"', desc = "mpv", for = "linux" },
]

# Text fallback
text = [
    { run = 'nvim "$1"', block = true, desc = "nvim", for = "unix" },
]

[open]
rules = [
    # Videos
    { mime = "video/*", use = "video" },
    { name = "*.mp4", use = "video" },
    { name = "*.mkv", use = "video" },
    { name = "*.avi", use = "video" },
    { name = "*.mov", use = "video" },
    { name = "*.webm", use = "video" },
    
    # Images
    { mime = "image/*", use = "image" },
    { name = "*.jpg", use = "image" },
    { name = "*.jpeg", use = "image" },
    { name = "*.png", use = "image" },
    { name = "*.gif", use = "image" },
    { name = "*.webp", use = "image" },
    { name = "*.svg", use = "image" },
    
    # Code & text
    { name = "*.rs", use = "editor" },
    { name = "*.py", use = "editor" },
    { name = "*.js", use = "editor" },
    { name = "*.ts", use = "editor" },
    { name = "*.html", use = "editor" },
    { name = "*.css", use = "editor" },
    { name = "*.json", use = "editor" },
    { name = "*.toml", use = "editor" },
    { name = "*.yaml", use = "editor" },
    { name = "*.yml", use = "editor" },
    { name = "*.sh", use = "editor" },
    { name = "*.lua", use = "editor" },
    { name = "*.c", use = "editor" },
    { name = "*.cpp", use = "editor" },
    { name = "*.go", use = "editor" },
    { name = "*.md", use = "editor" },
    { name = "*.txt", use = "editor" },
    
    # Web
    { mime = "text/html", use = "browser" },
    { name = "*.html", use = "browser" },
    
    # PDFs - Ocular
    { mime = "application/pdf", use = "pdf" },
    { name = "*.pdf", use = "pdf" },
    
    # Office documents - LibreOffice
    { mime = "application/msword", use = "office" },
    { mime = "application/vnd.openxmlformats-officedocument.wordprocessingml.document", use = "office" },
    { mime = "application/vnd.ms-excel", use = "office" },
    { mime = "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet", use = "office" },
    { mime = "application/vnd.ms-powerpoint", use = "office" },
    { mime = "application/vnd.openxmlformats-officedocument.presentationml.presentation", use = "office" },
    { name = "*.doc", use = "office" },
    { name = "*.docx", use = "office" },
    { name = "*.xls", use = "office" },
    { name = "*.xlsx", use = "office" },
    { name = "*.ppt", use = "office" },
    { name = "*.pptx", use = "office" },
    { name = "*.odt", use = "office" },
    { name = "*.ods", use = "office" },
    { name = "*.odp", use = "office" },
    
    # Archives
    { mime = "application/zip", use = "archive" },
    { name = "*.zip", use = "archive" },
    { name = "*.tar.gz", use = "archive" },
    { name = "*.rar", use = "archive" },
    { name = "*.7z", use = "archive" },
    
    # Audio
    { mime = "audio/*", use = "audio" },
    { name = "*.mp3", use = "audio" },
    { name = "*.flac", use = "audio" },
    { name = "*.ogg", use = "audio" },
    { name = "*.wav", use = "audio" },
]
